// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  // Make hermesEnabled available to all subprojects (incl. expo-modules-core)
  // before any of them are configured. In Gradle 8.x, cross-project bare
  // property access requires the property to be in project.ext.
  ext.hermesEnabled = (findProperty('hermesEnabled') ?: 'true').toBoolean()

  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
